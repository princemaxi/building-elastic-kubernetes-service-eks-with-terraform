apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: maxiprofresh@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - selector:
        dnsZones:
          - "qyonlimited.com"
      dns01:
        route53:
          region: eu-west-2
          role: "arn:aws:iam::686255973523:role/cert_manager_role"
          auth:
            kubernetes:
              serviceAccountRef:
                name: "cert-manager"
